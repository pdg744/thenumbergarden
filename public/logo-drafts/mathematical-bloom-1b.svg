<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">The Number Garden wordmark refinement 1B</title>
  <desc id="desc">A more mathematical refinement of the Mathematical Bloom wordmark with measured rhythm.</desc>
  <defs>
    <linearGradient id="bg-b" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbf6eb" />
      <stop offset="100%" stop-color="#f3eedf" />
    </linearGradient>
  </defs>
  <style>
    .paper { fill: url(#bg-b); }
    .grid { stroke: #d9e3cd; stroke-width: 1.2; }
    .ink { fill: #213225; }
    .moss { stroke: #36543b; }
    .leaf { fill: #6c8a53; }
    .clay { fill: #c86d4b; }
    .sun { fill: #f4c96b; }
    .the {
      font-family: "Avenir Next", "Gill Sans", sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.4em;
    }
    .wordmark {
      font-family: "Baskerville", "Iowan Old Style", "Palatino Linotype", serif;
      font-size: 94px;
      letter-spacing: -0.034em;
    }
    .note {
      font-family: "Avenir Next", "Gill Sans", sans-serif;
      font-size: 18px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
  </style>

  <rect class="paper" width="1400" height="420" rx="28" />

  <g opacity="0.8">
    <path class="grid" d="M122 86H1278" />
    <path class="grid" d="M122 162H1278" />
    <path class="grid" d="M122 238H1278" />
    <path class="grid" d="M122 314H1278" />
    <path class="grid" d="M248 48V346" />
    <path class="grid" d="M468 48V346" />
    <path class="grid" d="M688 48V346" />
    <path class="grid" d="M908 48V346" />
    <path class="grid" d="M1128 48V346" />
  </g>

  <g transform="translate(122 100)">
    <path
      d="M129 102c-35-3-62-29-62-61 0-34 29-61 64-61 34 0 61 24 61 54 0 26-20 46-45 46-18 0-33-14-33-30 0-15 11-26 27-26 13 0 23 7 29 17"
      fill="none"
      stroke="#36543b"
      stroke-linecap="round"
      stroke-width="6.5"
    />
    <path d="M24 168H205" fill="none" stroke="#36543b" stroke-linecap="round" stroke-width="2.5" opacity="0.72" />
    <path d="M58 160V176" fill="none" stroke="#36543b" stroke-width="2.5" opacity="0.72" />
    <path d="M114 156V180" fill="none" stroke="#36543b" stroke-width="2.5" opacity="0.72" />
    <path d="M170 160V176" fill="none" stroke="#36543b" stroke-width="2.5" opacity="0.72" />
    <circle class="clay" cx="192" cy="44" r="9" />
    <circle class="sun" cx="26" cy="168" r="7" />
    <circle class="leaf" cx="114" cy="168" r="4.5" />
  </g>

  <text class="the ink" x="350" y="134">THE</text>
  <text class="wordmark ink" x="348" y="226">Number Garden</text>

  <path d="M350 250H1096" fill="none" stroke="#c7d7ba" stroke-linecap="round" stroke-width="3.5" />
  <path d="M515 242V258" fill="none" stroke="#c7d7ba" stroke-width="3.5" />
  <path d="M705 240V260" fill="none" stroke="#c7d7ba" stroke-width="3.5" />
  <path d="M907 242V258" fill="none" stroke="#c7d7ba" stroke-width="3.5" />

  <text class="note" fill="#5d6d5a" x="349" y="315">Refinement B  Measured Bloom</text>
</svg>
