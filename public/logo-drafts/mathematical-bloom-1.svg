<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">The Number Garden wordmark draft 1</title>
  <desc id="desc">A wordmark with an elegant serif title and a spiral seed motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fcf7ee" />
      <stop offset="100%" stop-color="#f5efdf" />
    </linearGradient>
  </defs>
  <style>
    .paper { fill: url(#bg); }
    .ink { fill: #213225; }
    .moss { stroke: #36543b; }
    .clay { fill: #c86d4b; }
    .sun { fill: #f4c96b; }
    .the {
      font-family: "Avenir Next", "Gill Sans", sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.38em;
    }
    .wordmark {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 94px;
      letter-spacing: -0.035em;
    }
    .tag {
      font-family: "Avenir Next", "Gill Sans", sans-serif;
      font-size: 18px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
  </style>

  <rect class="paper" width="1400" height="420" rx="28" />

  <g transform="translate(118 98)">
    <path
      d="M122 102c-33-3-59-27-59-58 0-33 28-59 62-59 33 0 59 24 59 54 0 25-19 46-44 46-19 0-34-14-34-31 0-14 12-26 28-26 13 0 22 8 28 18"
      fill="none"
      stroke="#36543b"
      stroke-linecap="round"
      stroke-width="7"
    />
    <circle class="clay" cx="182" cy="44" r="11" />
    <circle class="sun" cx="38" cy="154" r="9" />
    <circle class="clay" cx="14" cy="181" r="5" />
    <path
      d="M76 170c35-24 68-28 102-18"
      fill="none"
      stroke="#6c8a53"
      stroke-linecap="round"
      stroke-width="4"
      opacity="0.85"
    />
  </g>

  <text class="the ink" x="338" y="126">THE</text>
  <text class="wordmark ink" x="336" y="222">Number Garden</text>

  <path
    d="M342 249c108 34 246 44 418 32 160-11 291-4 395 22"
    fill="none"
    stroke="#c7d7ba"
    stroke-linecap="round"
    stroke-width="4"
  />
  <circle class="clay" cx="344" cy="249" r="5" />
  <circle class="sun" cx="619" cy="284" r="5" />
  <circle class="clay" cx="1004" cy="273" r="5" />

  <text class="tag" fill="#5d6d5a" x="341" y="314">Mathematical Bloom Draft One</text>
</svg>
