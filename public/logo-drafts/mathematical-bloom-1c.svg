<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">The Number Garden wordmark refinement 1C</title>
  <desc id="desc">A more iconic refinement of the Mathematical Bloom wordmark with a stronger symbol lockup.</desc>
  <defs>
    <linearGradient id="bg-c" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fcf7ec" />
      <stop offset="100%" stop-color="#f5eedc" />
    </linearGradient>
  </defs>
  <style>
    .paper { fill: url(#bg-c); }
    .ink { fill: #203124; }
    .moss { stroke: #36543b; }
    .leaf { fill: #6c8a53; }
    .clay { fill: #c86d4b; }
    .sun { fill: #f4c96b; }
    .the {
      font-family: "Avenir Next", "Gill Sans", sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.42em;
    }
    .wordmark {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 96px;
      letter-spacing: -0.038em;
    }
    .note {
      font-family: "Avenir Next", "Gill Sans", sans-serif;
      font-size: 18px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
  </style>

  <rect class="paper" width="1400" height="420" rx="28" />

  <g transform="translate(108 84)">
    <circle cx="110" cy="110" r="84" fill="none" stroke="#d3dfc5" stroke-width="3" />
    <path
      d="M149 113c-29-2-54-23-54-50 0-29 24-51 54-51 29 0 53 20 53 46 0 22-17 39-38 39-16 0-28-11-28-25 0-12 10-21 22-21 10 0 18 5 24 14"
      fill="none"
      stroke="#36543b"
      stroke-linecap="round"
      stroke-width="6.5"
    />
    <path
      d="M81 144c24 26 52 40 84 42"
      fill="none"
      stroke="#6c8a53"
      stroke-linecap="round"
      stroke-width="4"
    />
    <path
      d="M165 176c-16-6-30-2-40 14 18 4 33-1 40-14Z"
      class="leaf"
    />
    <circle class="clay" cx="200" cy="50" r="9" />
    <circle class="sun" cx="84" cy="174" r="7" />
  </g>

  <text class="the ink" x="358" y="134">THE</text>
  <text class="wordmark ink" x="356" y="225">Number Garden</text>

  <path
    d="M360 251c108 28 226 38 353 31 125-7 230 4 315 31"
    fill="none"
    stroke="#d3dfc5"
    stroke-linecap="round"
    stroke-width="3.5"
  />
  <circle class="clay" cx="360" cy="251" r="4.5" />
  <circle class="sun" cx="612" cy="278" r="4.5" />
  <circle class="leaf" cx="916" cy="281" r="4.5" />

  <text class="note" fill="#5d6d5a" x="359" y="315">Refinement C  Iconic Bloom</text>
</svg>
