<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var seg = window.location.pathname.replace(/^\/app/, '') || '/';
      window.location.replace(
        window.location.origin + '/app/?path=' + encodeURIComponent(seg) +
        (window.location.search ? '&' + window.location.search.slice(1) : '') +
        window.location.hash
      );
    </script>
  </head>
  <body></body>
</html>
